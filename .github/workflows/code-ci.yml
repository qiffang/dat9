name: code-ci

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout agfs dependency
        run: |
          git clone --depth 1 https://github.com/c4pt0r/agfs ../agfs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build (server and cli)
        run: make build
